<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FREE 6 DAYS TRAINING</title>

  <!-- Orbitron font -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <!-- Font Awesome for arrow icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background: #fff;
      color: #b30000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }

    .container {
      max-width: 480px;
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      box-shadow: 0 0 30px rgba(179, 0, 0, 0.15);
      animation: fadeIn 0.8s ease;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 1rem;
      color: #b30000;
    }

    h2 {
      font-size: 1.1rem;
      margin-bottom: 1.2rem;
      color: #d00000;
    }

    p {
      font-size: 0.95rem;
      color: #444;
      margin-bottom: 1.5rem;
      line-height: 1.6;
    }

    .highlight {
      background: #ffe5e5;
      border: 1px solid #ff9999;
      color: #b30000;
      padding: 0.7rem 1rem;
      border-radius: 8px;
      display: inline-block;
      margin-bottom: 1.5rem;
      font-weight: 700;
    }

    .arrow {
      font-size: 2rem;
      color: #b30000;
      margin: 1rem 0;
      animation: bounce 1.5s infinite;
    }

    /* BIG CTA BUTTON */
    .btn {
      background: #b30000;
      color: #fff;
      padding: 1.4rem 2.5rem;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: 1px;
      text-decoration: none;
      display: inline-block;
      animation: shake 1.5s infinite ease-in-out;
      box-shadow: 0 0 25px rgba(179, 0, 0, 0.4);
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(179, 0, 0, 0.6);
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(2deg); }
      50% { transform: rotate(-2deg); }
      75% { transform: rotate(2deg); }
    }

    footer {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #999;
    }

    @media (max-width: 600px) {
      h1 { font-size: 1.4rem; }
      .btn { font-size: 1.1rem; padding: 1.2rem 2rem; }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>FREE 6 DAYS VIDEO EDITING & ANIMATING TRAINING</h1>
    <h2>Limited Spots Available</h2>

    <p class="highlight">All You Need is Your Smartphone & Data Connection</p>

    <div class="arrow">
      <i class="fa-solid fa-angles-down"></i>
    </div>

    <p><strong>Click the big red button below to join for FREE now</strong></p>

    <a href="https://chat.whatsapp.com/CuOuexEjt9SJjd1Tm7S9Ad" class="btn">
      CLICK HERE TO JOIN NOW
    </a>
  </div>

</body>
</html>
